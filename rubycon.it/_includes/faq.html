<section id="faq" class="faq">
    <div class="faq__container">
        <header class="faq__header">
            <p class="faq__eyebrow">Questions & Answers</p>
            <h2 class="faq__title">Frequently Asked Questions</h2>
            <p class="faq__intro">
                If you don't find the answer you were looking for, contact our
                <a href="mailto:{{ site.support_email }}">support team</a> or join our
                <a href="{{ site.social_url.discord }}">Discord Channel</a>.
            </p>
        </header>

        <div class="faq__list">
            {% for data in site.data.faq %}
                <article class="faq__item">
                    <h3 class="faq__question">{{ data.question }}</h3>
                    <p class="faq__answer">{{ data.answer }}</p>
                </article>
            {% endfor %}
        </div>
    </div>
</section>
