{% if site.event.sold_out_banner %}
    <div class="bg-red-800 text-white text-center py-3 px-4 font-semibold tracking-wide animate-pulse relative z-50">
        {{ site.event.sold_out_banner }}
        <a href="{{ site.event.ticket_url }}" class="underline hover:text-yellow-300 ml-2">Get yours now →</a>
    </div>
{% endif %}

<div id="home" class="relative min-h-screen text-[#fcf7e8] flex flex-col justify-center bg-cover bg-center" style="background-image: url('{{ "/assets/images/ambasciatori.jpg" | relative_url }}');">
    <!-- Wine Red Overlay - slightly more opaque to match Figma -->
    <div class="absolute inset-0 bg-[#802126] opacity-90"></div>

    <div class="relative z-10 mx-auto px-4 sm:px-6 lg:px-12 w-full pt-24 pb-12">
        <div data-aos="fade-up">
            <h1 class="text-7xl md:text-[180px] font-bold leading-[0.8] mb-12 tracking-tighter text-[#fcf7e8]" style="font-family: 'Trajan Pro', 'Cinzel', serif;">
                RVBYCON
            </h1>
            
            <div class="flex flex-col md:flex-row md:items-end justify-between gap-12 mt-12">
                <div class="max-w-2xl">
                    <div class="text-3xl md:text-5xl font-medium mb-6" style="font-family: 'Trajan Pro', 'Cinzel', serif;">
                        {{ site.event.date }} &bull; {{ site.event.location }}
                    </div>
                    <p class="text-xl md:text-2xl mb-10 opacity-80 font-serif italic leading-relaxed">
                        The premier Ruby conference<br>in the heart of Italy
                    </p>
                    
                    <div class="flex flex-col sm:flex-row space-y-4 sm:space-y-0 sm:space-x-6">
                        <a href="{{ site.event.tickets_url }}" class="inline-block bg-[#fcf7e8] text-[#802126] px-10 py-4 rounded-sm font-bold text-sm uppercase tracking-widest hover:bg-white transition-all duration-300 text-center shadow-2xl">
                            Buy ticket now
                        </a>
                        <a href="#about" class="inline-block border border-[#fcf7e8]/40 text-[#fcf7e8] px-10 py-4 rounded-sm font-bold text-sm uppercase tracking-widest hover:border-[#fcf7e8] transition-all duration-300 text-center">
                            Learn more
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Decorative Down Arrow -->
    <div class="absolute bottom-12 left-1/2 -translate-x-1/2 animate-bounce opacity-40">
        <i class="fas fa-arrow-down text-3xl"></i>
    </div>
</div>
