{% if site.event.sold_out_banner %}
    <div class="bg-red-800 text-white text-center py-3 px-4 font-semibold tracking-wide animate-pulse">
        {{ site.event.sold_out_banner }}
        <a href="{{ site.event.ticket_url }}" class="underline hover:text-yellow-300 ml-2">Get yours now →</a>
    </div>
{% endif %}

<div id="home" class="relative text-white flex items-center bg-cover bg-center" style="min-height: 80vh; background-image: url('{{ "/assets/images/ambasciatori.jpg" | relative_url }}');">
    <!-- Wine Red Overlay -->
    <div class="absolute inset-0 bg-[#802126] opacity-85"></div>

    <div class="relative z-10 mx-auto px-4 sm:px-6 lg:px-12 py-20 w-full">
        <div class="max-w-4xl" data-aos="fade-up">
            <h1 class="text-6xl md:text-9xl font-bold mb-4 tracking-tighter text-white" style="font-family: 'Cinzel', serif;">
                RVBYCON <span class="text-white/80 inline-block ml-4">I<i class="fas fa-gem text-5xl md:text-7xl mx-1" style="vertical-align: middle;"></i>I</span>
            </h1>
            <div class="text-2xl md:text-4xl font-medium mb-6 opacity-90" style="font-family: 'Cinzel', serif;">
                {{ site.event.date }} &bull; {{ site.event.location }}
            </div>
            <p class="text-xl md:text-2xl mb-10 max-w-2xl font-light italic">
                The premier Ruby conference in the heart of Italy
            </p>
            
            <div class="flex flex-col sm:flex-row space-y-4 sm:space-y-0 sm:space-x-6">
                <a href="{{ site.event.tickets_url }}" class="inline-block bg-[#fcf7e8] text-[#802126] px-10 py-4 rounded-full font-bold text-lg hover:bg-white transition duration-300 text-center shadow-xl">
                    Buy ticket now
                </a>
                <a href="#about" class="inline-block border-2 border-[#fcf7e8] text-[#fcf7e8] px-10 py-4 rounded-full font-bold text-lg hover:bg-[#fcf7e8] hover:text-[#802126] transition duration-300 text-center shadow-lg">
                    Learn more
                </a>
            </div>
        </div>
        
        <!-- Arrow Down (decorative) -->
        <div class="absolute bottom-10 left-1/2 -translate-x-1/2 animate-bounce opacity-50">
            <i class="fas fa-chevron-down text-3xl"></i>
        </div>
    </div>
</div>
