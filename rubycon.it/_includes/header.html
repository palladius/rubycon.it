<header class="fixed top-0 left-0 right-0 z-50 transition-all duration-500 bg-transparent" id="main-header">
    <a href="#content" class="sr-only focus:not-sr-only focus:fixed focus:top-4 focus:left-4 focus:z-[100] focus:bg-red-800 focus:text-white focus:px-6 focus:py-3 focus:rounded-md focus:font-bold">Skip to content</a>
    <!-- navigation -->
    <nav class="relative">
        <div class="px-4 mx-auto lg:px-12">
            <div class="flex justify-between min-h-24 md:min-h-28 py-3 md:py-4 items-center gap-4">
                <div class="flex-shrink-0 flex items-center">
                    <a href="/" class="flex items-center group" aria-label="Rubycon home">
                        <img
                            id="header-logo"
                            src="{{ '/assets/images/logo/Logo-Pictogram-Cream.png' | relative_url }}"
                            data-logo-cream="{{ '/assets/images/logo/Logo-Pictogram-Cream.png' | relative_url }}"
                            data-logo-red="{{ '/assets/images/logo/Logo-Pictogram-Red.svg' | relative_url }}"
                            alt="Rubycon"
                            width="188"
                            height="32"
                            decoding="async"
                            fetchpriority="high"
                            class="block h-auto w-[clamp(120px,24vw,188px)] max-w-full transition-opacity duration-300 ease-out"
                        >
                    </a>
                </div>
                <div class="hidden lg:block flex-1">
                    <div class="ml-10 flex items-center justify-end gap-8">
                        {% for nav in site.data.navigation %}
                        <div class="relative group inline-block">
                            {% if nav.link %}
                                <a href="{{ nav.link }}" class="text-[#fcf7e8] opacity-80 transition-all nav-link inline-flex items-center px-1 py-2 md:px-2 lg:px-1" data-nav-link style="font-family: 'Noto Serif', serif; font-weight: 400; font-size: 20px; line-height: 20px; letter-spacing: 0; vertical-align: middle;">
                                    {{ nav.name }}
                                </a>
                            {% else %}
                                <span class="text-[#fcf7e8] opacity-80 transition-all nav-link inline-flex items-center px-1 py-2 md:px-2 lg:px-1 cursor-pointer" data-nav-link style="font-family: 'Noto Serif', serif; font-weight: 400; font-size: 20px; line-height: 20px; letter-spacing: 0; vertical-align: middle;">
                                    {{ nav.name }}
                                </span>
                            {% endif %}
                        </div>
                        {% endfor %}
                        <a href="{{ site.event.tickets_url }}" class="bg-[#fcf7e8] text-[#802126] rounded-none transition-all shadow-lg header-btn inline-flex items-center justify-center w-[207px] h-[52px] max-w-full px-4 text-center" style="font-family: 'Noto Serif', serif; font-weight: 500; font-size: 20px; line-height: 20px; letter-spacing: 0; vertical-align: middle;">
                            Get your ticket
                        </a>
                    </div>
                </div>
                <div class="lg:hidden flex items-center gap-4">
                    <button class="mobile-menu-button p-0 text-[#fcf7e8] focus:outline-none flex items-center gap-2 px-4 py-3" id="mobile-toggle" aria-expanded="false" aria-controls="mobile-menu" style="background-color: transparent;">
                        <span class="mobile-menu-label" style="font-family: 'Noto Serif', serif; font-weight: 500; font-size: 16px; letter-spacing: 0;">MENU</span>
                        <svg width="24" height="12" viewBox="0 0 24 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M0.878906 12C0.636719 12 0.429688 11.9141 0.257812 11.7422C0.0859375 11.5625 0 11.3477 0 11.0977C0 10.8555 0.0859375 10.6484 0.257812 10.4766C0.429688 10.3047 0.636719 10.2188 0.878906 10.2188H22.8164C23.0586 10.2188 23.2656 10.3047 23.4375 10.4766C23.6172 10.6484 23.707 10.8555 23.707 11.0977C23.707 11.3477 23.6172 11.5625 23.4375 11.7422C23.2656 11.9141 23.0586 12 22.8164 12H0.878906ZM0.878906 6.87891C0.636719 6.87891 0.429688 6.79297 0.257812 6.62109C0.0859375 6.44922 0 6.24219 0 6C0 5.75 0.0859375 5.53906 0.257812 5.36719C0.429688 5.1875 0.636719 5.09766 0.878906 5.09766H22.8164C23.0586 5.09766 23.2656 5.1875 23.4375 5.36719C23.6172 5.53906 23.707 5.75 23.707 6C23.707 6.24219 23.6172 6.44922 23.4375 6.62109C23.2656 6.79297 23.0586 6.87891 22.8164 6.87891H0.878906ZM0.878906 1.76953C0.636719 1.76953 0.429688 1.68359 0.257812 1.51172C0.0859375 1.33984 0 1.13281 0 0.890625C0 0.640625 0.0859375 0.429688 0.257812 0.257812C0.429688 0.0859375 0.636719 0 0.878906 0H22.8164C23.0586 0 23.2656 0.0859375 23.4375 0.257812C23.6172 0.429688 23.707 0.640625 23.707 0.890625C23.707 1.13281 23.6172 1.33984 23.4375 1.51172C23.2656 1.68359 23.0586 1.76953 22.8164 1.76953H0.878906Z" fill="#FCF7E8"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <!-- mobile menu -->
        <div class="mobile-menu hidden fixed inset-0 z-50 text-center bg-[#802126]" id="mobile-menu" style="top: 0;">
            <div class="absolute top-6 right-6 z-50">
                <button class="text-[#fcf7e8] text-4xl w-12 h-12 flex items-center justify-center" id="mobile-menu-close" style="font-size: 32px; line-height: 1;">×</button>
            </div>
            <div class="px-4 pt-24 pb-8 space-y-8 h-full overflow-y-auto">
                {% for nav in site.data.navigation  %}
                    <a href="{{ nav.link }}" class="mobile-nav-link block text-4xl font-serif text-[#fcf7e8] opacity-90 hover:opacity-100 py-6" style="font-family: 'Noto Serif', serif; font-weight: 400; font-size: 32px; line-height: 40px;" onclick="document.getElementById('mobile-toggle').style.visibility='visible'; document.getElementById('mobile-menu').classList.add('hidden');">
                        {{ nav.name }}
                    </a>
                {% endfor %}
            </div>
        </div>
    </nav>
</header>

<style>
    #main-header.scrolled #mobile-toggle svg path {
        fill: #802126;
        transition: fill 0.3s ease-out;
    }

    #mobile-toggle svg path {
        fill: #FCF7E8;
        transition: fill 0.3s ease-out;
    }

    #mobile-toggle {
        min-height: 44px;
        min-width: 44px;
        width: auto;
        max-width: 100%;
        gap: 8px;
        white-space: nowrap;
    }

    .mobile-menu-label {
        line-height: 1.2;
    }

    .mobile-nav-link {
        overflow-wrap: anywhere;
        hyphens: auto;
    }

    @media (max-width: 767px) {
        #mobile-toggle {
            padding: 10px 12px !important;
        }

        .mobile-menu-label {
            font-size: clamp(14px, 4.2vw, 16px) !important;
        }

        .mobile-nav-link {
            font-size: clamp(24px, 8.6vw, 32px) !important;
            line-height: 1.25 !important;
            padding-top: 16px !important;
            padding-bottom: 16px !important;
        }
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const header = document.getElementById('main-header');
        const logo = document.getElementById('header-logo');
        const mobileToggle = document.getElementById('mobile-toggle');
        const mobileMenu = document.getElementById('mobile-menu');
        const navLinks = document.querySelectorAll('[data-nav-link]');
        const logoCream = logo?.dataset.logoCream;
        const logoRed = logo?.dataset.logoRed;
        const scrolledThreshold = 48;
        const isHomePage = window.location.pathname === '/' || window.location.pathname === '/index.html';

        function updateHeader() {
            const isScrolled = !isHomePage || window.scrollY > scrolledThreshold;

            if (isScrolled) {
                header.classList.add('scrolled');
                if (logo && logoRed) {
                    logo.src = logoRed;
                }
            } else {
                header.classList.remove('scrolled');
                if (logo && logoCream) {
                    logo.src = logoCream;
                }
            }

            mobileToggle?.setAttribute('aria-expanded', mobileMenu && !mobileMenu.classList.contains('hidden') ? 'true' : 'false');
        }

        window.addEventListener('scroll', updateHeader);
        updateHeader(); // initial state

        mobileToggle?.addEventListener('click', () => {
            const isOpen = !mobileMenu?.classList.contains('hidden');
            mobileMenu?.classList.toggle('hidden');
            mobileToggle.setAttribute('aria-expanded', isOpen ? 'false' : 'true');
            // Nascondi il bottone quando il menu è aperto
            if (!isOpen) {
                mobileToggle.style.visibility = 'hidden';
            } else {
                mobileToggle.style.visibility = 'visible';
            }
        });

        document.getElementById('mobile-menu-close')?.addEventListener('click', () => {
            mobileMenu?.classList.add('hidden');
            mobileToggle.style.visibility = 'visible';
            mobileToggle.setAttribute('aria-expanded', 'false');
        });
    });
</script>
